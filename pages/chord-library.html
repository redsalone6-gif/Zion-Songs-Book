
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chord Library · Zion Songs Book</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="../index.html">Zion Songs Book</a>
      <nav class="nav">
        <a class="active" href="chord-library.html">Library</a>
        <a href="add-new-song.html">Add Song</a>
        <a href="collections.html">Collections</a>
        <a href="tuner.html">Tuner</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <section class="panel" style="padding:20px">
      <div class="badge">Working library</div>
      <h1 style="margin:12px 0 0">Chord Library</h1>
      <p class="footer-note">This screen is connected to browser storage, so newly added songs appear here automatically.</p>
      <div class="searchbar">
        <input id="search" class="input" placeholder="Search by title, artist, category, or collection">
        <button class="btn secondary" onclick="renderLibrary()">Search</button>
        <button class="btn secondary" onclick="document.getElementById('search').value=''; renderLibrary()">Clear</button>
        <button class="btn danger" onclick="handleReset()">Reset default songs</button>
      </div>
      <div id="summary" class="notice" style="display:none"></div>
      <div id="libraryList" class="list"></div>
    </section>
  </main>
  <script src="../assets/app.js"></script>
  <script>
    function handleReset() {
      if (!confirm('Reset the full library to the default songs?')) return;
      resetLibrary();
      renderLibrary();
    }
    function renderLibrary() {
      const q = (document.getElementById('search').value || '').trim().toLowerCase();
      const songs = getSongs().filter(song => {
        if (!q) return true;
        return [song.title, song.artist, song.category, song.collection, song.key].join(' ').toLowerCase().includes(q);
      });
      const list = document.getElementById('libraryList');
      const summary = document.getElementById('summary');
      summary.style.display = 'block';
      summary.textContent = `${songs.length} song(s) shown · ${getSongs().length} total in library`;
      if (!songs.length) {
        list.innerHTML = '<div class="empty">No songs match your search. Try a different keyword or add a new song.</div>';
        return;
      }
      list.innerHTML = songs.map(songCard).join('');
    }
    renderLibrary();
  </script>
</body>
</html>

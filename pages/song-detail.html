
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Song Detail · Zion Songs Book</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="../index.html">Zion Songs Book</a>
      <nav class="nav">
        <a href="chord-library.html">Library</a>
        <a href="add-new-song.html">Add Song</a>
        <a class="active" href="song-detail.html">Song Detail</a>
        <a href="collections.html">Collections</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <div id="detail"></div>
  </main>
  <script src="../assets/app.js"></script>
  <script>
    function renderDetail() {
      const song = getSelectedSong();
      const root = document.getElementById('detail');
      if (!song) {
        root.innerHTML = '<div class="empty">No song selected. Open one from the library first.</div>';
        return;
      }
      root.innerHTML = `
        <section class="panel" style="padding:20px">
          <div class="badge">Song detail</div>
          <h1 style="margin:12px 0 6px">${escapeHtml(song.title)}</h1>
          <div class="kv">
            <b>Artist</b><span>${escapeHtml(song.artist || '-')}</span>
            <b>Key</b><span>${escapeHtml(song.key || '-')}</span>
            <b>Tempo</b><span>${escapeHtml(song.tempo || '-')} BPM</span>
            <b>Category</b><span>${escapeHtml(song.category || '-')}</span>
            <b>Collection</b><span>${escapeHtml(song.collection || '-')}</span>
            <b>Capo</b><span>${escapeHtml(song.capo || '-')}</span>
          </div>
          <div class="actions">
            <button class="btn secondary" onclick="toggleFavorite('${song.id}'); renderDetail();">${song.favorite ? 'Unfavorite' : 'Favorite'}</button>
            <a class="btn secondary" href="chord-library.html">Back to library</a>
          </div>
          <hr class="sep">
          <h3>Lyrics</h3>
          <pre class="lyrics">${escapeHtml(song.lyrics || 'No lyrics added yet.')}</pre>
          <h3>Chords</h3>
          <pre class="lyrics">${escapeHtml(song.chords || 'No chords added yet.')}</pre>
        </section>`;
    }
    renderDetail();
  </script>
</body>
</html>

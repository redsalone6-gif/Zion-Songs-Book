
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Add New Song · Zion Songs Book</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="../index.html">Zion Songs Book</a>
      <nav class="nav">
        <a href="chord-library.html">Library</a>
        <a class="active" href="add-new-song.html">Add Song</a>
        <a href="collections.html">Collections</a>
        <a href="tuner.html">Tuner</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <section class="panel" style="padding:20px">
      <div class="badge">Real form</div>
      <h1 style="margin:12px 0 0">Add New Song</h1>
      <p class="footer-note">When you submit, the song is saved to local storage and immediately appears in the library.</p>
      <div id="message" style="display:none" class="notice"></div>
      <form id="songForm" style="margin-top:18px">
        <div class="row">
          <div><label>Song Title<input class="input" name="title" required></label></div>
          <div><label>Artist / Writer<input class="input" name="artist"></label></div>
        </div>
        <div class="row-3" style="margin-top:16px">
          <div><label>Key<input class="input" name="key" placeholder="G"></label></div>
          <div><label>Tempo<input class="input" name="tempo" placeholder="72"></label></div>
          <div><label>Capo<input class="input" name="capo" placeholder="0"></label></div>
        </div>
        <div class="row" style="margin-top:16px">
          <div><label>Category<input class="input" name="category" placeholder="Worship"></label></div>
          <div><label>Collection<input class="input" name="collection" placeholder="Sunday Service"></label></div>
        </div>
        <div style="margin-top:16px"><label>Lyrics<textarea class="textarea" name="lyrics" placeholder="Paste the lyrics here"></textarea></label></div>
        <div style="margin-top:16px"><label>Chords / Chord Sheet<textarea class="textarea" name="chords" placeholder="Paste chords here"></textarea></label></div>
        <div class="actions">
          <button class="btn primary" type="submit">Save song</button>
          <a class="btn secondary" href="chord-library.html">Open library</a>
        </div>
      </form>
    </section>
  </main>
  <script src="../assets/app.js"></script>
  <script>
    const form = document.getElementById('songForm');
    const msg = document.getElementById('message');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      try {
        const song = makeSongFromForm(form);
        addSong(song);
        msg.className = 'notice';
        msg.style.display = 'block';
        msg.textContent = `Saved "${song.title}" successfully.`;
        form.reset();
        setTimeout(() => { window.location.href = 'chord-library.html'; }, 700);
      } catch (err) {
        msg.className = 'notice warn';
        msg.style.display = 'block';
        msg.textContent = err.message || 'Could not save the song.';
      }
    });
  </script>
</body>
</html>

<script>
(function () {
  var state = {
    data: window.__APP_DATA__ || { songs: [], playlists: [], chords: [], stats: {}, featuredSong: null },
    filteredSongs: [],
    currentView: 'library',
    activeSongId: null,
    tuner: {
      stream: null,
      audioContext: null,
      analyser: null,
      source: null,
      raf: null,
      isRunning: false,
      oscillatorContext: null
    },
    externalTunerUrl: String(window.__EXTERNAL_TUNER_URL__ || '').trim()
  };

  var STRINGS = [
    { name: 'E2', frequency: 82.41 },
    { name: 'A2', frequency: 110.00 },
    { name: 'D3', frequency: 146.83 },
    { name: 'G3', frequency: 196.00 },
    { name: 'B3', frequency: 246.94 },
    { name: 'E4', frequency: 329.63 }
  ];

  var notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

  var els = {
    views: document.querySelectorAll('.view'),
    navButtons: document.querySelectorAll('.nav-btn'),
    songList: document.getElementById('songList'),
    songEmptyState: document.getElementById('songEmptyState'),
    statsGrid: document.getElementById('statsGrid'),
    featuredCard: document.getElementById('featuredCard'),
    searchInput: document.getElementById('searchInput'),
    focusSearchBtn: document.getElementById('focusSearchBtn'),
    refreshBtn: document.getElementById('refreshBtn'),
    playlistList: document.getElementById('playlistList'),
    chordGrid: document.getElementById('chordGrid'),
    referenceGrid: document.getElementById('referenceGrid'),
    songModal: document.getElementById('songModal'),
    songDetailContent: document.getElementById('songDetailContent'),
    closeModalBackdrop: document.getElementById('closeModalBackdrop'),
    closeModalBtn: document.getElementById('closeModalBtn'),
    toast: document.getElementById('toast'),
    songForm: document.getElementById('songForm'),
    saveSongBtn: document.getElementById('saveSongBtn'),
    resetFormBtn: document.getElementById('resetFormBtn'),
    startTunerBtn: document.getElementById('startTunerBtn'),
    stopTunerBtn: document.getElementById('stopTunerBtn'),
    tunerStatus: document.getElementById('tunerStatus'),
    tunerNote: document.getElementById('tunerNote'),
    tunerFrequency: document.getElementById('tunerFrequency'),
    tunerDetail: document.getElementById('tunerDetail')
  };

  state.filteredSongs = state.data.songs.slice();

  bindEvents();
  renderAll();

  function bindEvents() {
    Array.prototype.forEach.call(els.navButtons, function (button) {
      button.addEventListener('click', function () {
        switchView(button.getAttribute('data-view'));
      });
    });

    els.searchInput.addEventListener('input', function (event) {
      filterSongs(event.target.value);
    });

    els.focusSearchBtn.addEventListener('click', function () {
      switchView('library');
      els.searchInput.focus();
    });

    els.refreshBtn.addEventListener('click', refreshFromServer);
    els.songForm.addEventListener('submit', handleSaveSong);
    els.resetFormBtn.addEventListener('click', resetSongForm);
    els.closeModalBackdrop.addEventListener('click', closeSongModal);
    els.closeModalBtn.addEventListener('click', closeSongModal);
    els.startTunerBtn.addEventListener('click', startTuner);
    els.stopTunerBtn.addEventListener('click', stopTuner);
  }

  function renderAll() {
    renderFeatured();
    renderStats();
    renderSongs();
    renderPlaylists();
    renderChords();
    renderReferences();
  }

  function switchView(viewName) {
    state.currentView = viewName;
    Array.prototype.forEach.call(els.views, function (view) {
      view.classList.toggle('is-active', view.id === 'view-' + viewName);
    });
    Array.prototype.forEach.call(els.navButtons, function (button) {
      button.classList.toggle('is-active', button.getAttribute('data-view') === viewName);
    });
  }

  function filterSongs(query) {
    var q = String(query || '').trim().toLowerCase();
    if (!q) {
      state.filteredSongs = state.data.songs.slice();
      renderSongs();
      return;
    }

    state.filteredSongs = state.data.songs.filter(function (song) {
      return [song.title, song.artist, song.genre, song.key, song.lyrics]
        .join(' ')
        .toLowerCase()
        .indexOf(q) !== -1;
    });

    renderSongs();
  }

  function renderFeatured() {
    var song = state.data.featuredSong || state.data.songs[0];
    if (!song) {
      els.featuredCard.innerHTML = '<h2 class="hero-title">No songs yet</h2><p class="hero-subtitle">Add your first song to start building the mobile library.</p>';
      return;
    }

    els.featuredCard.innerHTML = [
      '<div class="hero-label">Recently Opened</div>',
      '<h2 class="hero-title">' + escapeHtml(song.title) + '</h2>',
      '<p class="hero-subtitle">' + escapeHtml(song.artist || 'Unknown Artist') + '</p>',
      '<div class="chip-row">',
        song.genre ? '<span class="chip">' + escapeHtml(song.genre) + '</span>' : '',
        song.key ? '<span class="chip">Key: ' + escapeHtml(song.key) + '</span>' : '',
        song.duration ? '<span class="chip">' + escapeHtml(song.duration) + '</span>' : '',
      '</div>',
      '<div class="song-card-actions" style="margin-top:18px">',
        '<button class="primary-btn" type="button" data-open-song="' + escapeHtml(song.id) + '">Open Song</button>',
      '</div>'
    ].join('');

    bindSongActionButtons(els.featuredCard);
  }

  function renderStats() {
    var stats = state.data.stats || {};
    var items = [
      { label: 'Total Songs', value: stats.totalSongs || 0 },
      { label: 'Playlists', value: stats.totalPlaylists || 0 },
      { label: 'Favorites', value: stats.favorites || 0 },
      { label: 'Keys Tracked', value: stats.keysTracked || 0 }
    ];

    els.statsGrid.innerHTML = items.map(function (item) {
      return [
        '<article class="stats-item">',
          '<p class="stats-item-label">' + escapeHtml(item.label) + '</p>',
          '<p class="stats-item-value">' + escapeHtml(String(item.value)) + '</p>',
        '</article>'
      ].join('');
    }).join('');
  }

  function renderSongs() {
    var songs = state.filteredSongs || [];
    els.songEmptyState.classList.toggle('hidden', songs.length > 0);
    els.songList.innerHTML = songs.map(function (song) {
      return [
        '<article class="song-card">',
          '<div class="song-card-top">',
            '<div>',
              '<h3>' + escapeHtml(song.title) + '</h3>',
              '<p class="artist">' + escapeHtml(song.artist || 'Unknown Artist') + '</p>',
            '</div>',
            song.isFavorite === 'TRUE' ? '<span class="meta-chip">★ Favorite</span>' : '',
          '</div>',
          '<div class="meta-row">',
            song.genre ? '<span class="meta-chip">' + escapeHtml(song.genre) + '</span>' : '',
            song.key ? '<span class="meta-chip">Key ' + escapeHtml(song.key) + '</span>' : '',
            song.duration ? '<span class="meta-chip">' + escapeHtml(song.duration) + '</span>' : '',
          '</div>',
          '<div class="song-card-actions">',
            '<button class="primary-btn" type="button" data-open-song="' + escapeHtml(song.id) + '">View</button>',
            '<button class="ghost-btn" type="button" data-edit-song="' + escapeHtml(song.id) + '">Edit</button>',
          '</div>',
        '</article>'
      ].join('');
    }).join('');

    bindSongActionButtons(els.songList);
  }

  function renderPlaylists() {
    els.playlistList.innerHTML = (state.data.playlists || []).map(function (playlist) {
      return [
        '<article class="playlist-card">',
          '<div class="playlist-top">',
            '<div>',
              '<h3>' + escapeHtml(playlist.name) + '</h3>',
              '<p>' + escapeHtml(playlist.description || '') + '</p>',
            '</div>',
            '<span class="playlist-count">' + escapeHtml(String((playlist.songIds || []).length)) + ' songs</span>',
          '</div>',
        '</article>'
      ].join('');
    }).join('');
  }

  function renderChords() {
    els.chordGrid.innerHTML = (state.data.chords || []).map(function (chord) {
      return [
        '<article class="chord-card">',
          '<p class="chord-name">' + escapeHtml(chord.name) + '</p>',
          '<p class="chord-shape">' + escapeHtml(chord.shape || '') + '</p>',
          '<p class="muted">' + escapeHtml(chord.notes || '') + '</p>',
        '</article>'
      ].join('');
    }).join('');
  }

  function renderReferences() {
    els.referenceGrid.innerHTML = STRINGS.map(function (item) {
      return [
        '<button class="reference-btn" type="button" data-reference-frequency="' + item.frequency + '">',
          '<strong>' + escapeHtml(item.name) + '</strong>',
          '<span>' + escapeHtml(item.frequency.toFixed(2)) + ' Hz</span>',
        '</button>'
      ].join('');
    }).join('');

    Array.prototype.forEach.call(els.referenceGrid.querySelectorAll('[data-reference-frequency]'), function (button) {
      button.addEventListener('click', function () {
        playReferenceTone(Number(button.getAttribute('data-reference-frequency')));
      });
    });
  }

  function bindSongActionButtons(root) {
    Array.prototype.forEach.call(root.querySelectorAll('[data-open-song]'), function (button) {
      button.addEventListener('click', function () {
        openSong(button.getAttribute('data-open-song'));
      });
    });

    Array.prototype.forEach.call(root.querySelectorAll('[data-edit-song]'), function (button) {
      button.addEventListener('click', function () {
        editSong(button.getAttribute('data-edit-song'));
      });
    });
  }

  function openSong(songId) {
    var song = findSong(songId);
    if (!song) return;
    state.activeSongId = songId;

    els.songDetailContent.innerHTML = [
      '<div class="detail-top">',
        '<div>',
          '<p class="eyebrow">Song Detail</p>',
          '<h2 class="modal-title">' + escapeHtml(song.title) + '</h2>',
          '<p class="detail-artist">' + escapeHtml(song.artist || 'Unknown Artist') + '</p>',
        '</div>',
      '</div>',
      '<div class="detail-meta">',
        song.genre ? '<span class="meta-chip">' + escapeHtml(song.genre) + '</span>' : '',
        song.key ? '<span class="meta-chip">Key ' + escapeHtml(song.key) + '</span>' : '',
        song.bpm ? '<span class="meta-chip">' + escapeHtml(song.bpm) + ' BPM</span>' : '',
        song.duration ? '<span class="meta-chip">' + escapeHtml(song.duration) + '</span>' : '',
      '</div>',
      '<div class="song-card-actions" style="margin-bottom:20px">',
        '<button class="primary-btn" type="button" id="detailEditBtn">Edit</button>',
        '<button class="secondary-btn" type="button" id="detailDeleteBtn">Delete</button>',
      '</div>',
      '<section class="detail-block">',
        '<h4>Chords</h4>',
        '<pre class="chords-text">' + escapeHtml(song.chords || 'No chords added.') + '</pre>',
      '</section>',
      '<section class="detail-block">',
        '<h4>Lyrics</h4>',
        '<p class="lyrics-text">' + escapeHtml(song.lyrics || 'No lyrics added.') + '</p>',
      '</section>'
    ].join('');

    els.songModal.classList.remove('hidden');

    document.getElementById('detailEditBtn').addEventListener('click', function () {
      closeSongModal();
      editSong(song.id);
    });

    document.getElementById('detailDeleteBtn').addEventListener('click', function () {
      handleDeleteSong(song.id);
    });
  }

  function closeSongModal() {
    els.songModal.classList.add('hidden');
    state.activeSongId = null;
  }

  function editSong(songId) {
    var song = findSong(songId);
    if (!song) return;

    setFormValue('songId', song.id);
    setFormValue('title', song.title);
    setFormValue('artist', song.artist);
    setFormValue('key', song.key);
    setFormValue('bpm', song.bpm);
    setFormValue('duration', song.duration);
    setFormValue('genre', song.genre);
    setFormValue('chords', song.chords);
    setFormValue('lyrics', song.lyrics);
    document.getElementById('isFavorite').checked = song.isFavorite === 'TRUE';

    switchView('add');
    showToast('Song loaded into the form.');
  }

  function resetSongForm() {
    els.songForm.reset();
    setFormValue('songId', '');
  }

  function handleSaveSong(event) {
    event.preventDefault();
    var payload = formToObject(els.songForm);
    setLoading(els.saveSongBtn, true, 'Saving...');

    runServer('saveSong', [payload], function (data) {
      state.data = data;
      state.filteredSongs = state.data.songs.slice();
      renderAll();
      resetSongForm();
      switchView('library');
      showToast('Song saved successfully.');
      setLoading(els.saveSongBtn, false, 'Save Song');
    }, function (message) {
      setLoading(els.saveSongBtn, false, 'Save Song');
      showToast(message || 'Unable to save song.');
    });
  }

  function handleDeleteSong(songId) {
    var confirmed = window.confirm('Delete this song?');
    if (!confirmed) return;

    runServer('deleteSong', [songId], function (data) {
      state.data = data;
      state.filteredSongs = state.data.songs.slice();
      renderAll();
      closeSongModal();
      showToast('Song deleted.');
    }, function (message) {
      showToast(message || 'Unable to delete song.');
    });
  }

  function refreshFromServer() {
    setLoading(els.refreshBtn, true, 'Refreshing...');
    runServer('getAppData', [], function (data) {
      state.data = data;
      state.filteredSongs = state.data.songs.slice();
      renderAll();
      setLoading(els.refreshBtn, false, 'Refresh');
      showToast('Library refreshed.');
    }, function () {
      setLoading(els.refreshBtn, false, 'Refresh');
      showToast('Using current loaded data.');
    });
  }

  function findSong(songId) {
    return (state.data.songs || []).find(function (song) { return song.id === songId; });
  }

  function formToObject(form) {
    var data = new FormData(form);
    return {
      id: String(data.get('id') || '').trim(),
      title: String(data.get('title') || '').trim(),
      artist: String(data.get('artist') || '').trim(),
      key: String(data.get('key') || '').trim(),
      bpm: String(data.get('bpm') || '').trim(),
      duration: String(data.get('duration') || '').trim(),
      genre: String(data.get('genre') || '').trim(),
      chords: String(data.get('chords') || '').trim(),
      lyrics: String(data.get('lyrics') || '').trim(),
      isFavorite: document.getElementById('isFavorite').checked
    };
  }

  function setFormValue(id, value) {
    var el = document.getElementById(id);
    if (el) el.value = value || '';
  }

  function setLoading(button, isLoading, loadingText) {
    if (!button) return;
    if (isLoading) {
      button.dataset.originalText = button.textContent;
      button.textContent = loadingText;
      button.disabled = true;
      return;
    }
    button.textContent = button.dataset.originalText || button.textContent;
    button.disabled = false;
  }

  function runServer(fnName, args, onSuccess, onFailure) {
    if (window.google && google.script && google.script.run && typeof google.script.run[fnName] === 'function') {
      var runner = google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(function (error) {
          onFailure(error && error.message ? error.message : 'Server error');
        });
      runner[fnName].apply(runner, args || []);
      return;
    }

    // Preview fallback for environments outside Apps Script.
    try {
      if (fnName === 'getAppData') {
        onSuccess(state.data);
      } else if (fnName === 'saveSong') {
        var payload = args[0] || {};
        if (!payload.id) payload.id = 'local-' + Date.now();
        payload.isFavorite = payload.isFavorite ? 'TRUE' : 'FALSE';
        var existingIndex = state.data.songs.findIndex(function (song) { return song.id === payload.id; });
        if (existingIndex > -1) {
          state.data.songs[existingIndex] = payload;
        } else {
          state.data.songs.unshift(payload);
        }
        state.data.featuredSong = state.data.songs[0];
        state.data.stats.totalSongs = state.data.songs.length;
        state.data.stats.favorites = state.data.songs.filter(function (song) { return song.isFavorite === 'TRUE'; }).length;
        onSuccess(state.data);
      } else if (fnName === 'deleteSong') {
        state.data.songs = state.data.songs.filter(function (song) { return song.id !== args[0]; });
        state.data.featuredSong = state.data.songs[0] || null;
        state.data.stats.totalSongs = state.data.songs.length;
        state.data.stats.favorites = state.data.songs.filter(function (song) { return song.isFavorite === 'TRUE'; }).length;
        onSuccess(state.data);
      } else {
        onFailure('Apps Script runtime not available in preview mode.');
      }
    } catch (err) {
      onFailure(err.message || 'Preview error');
    }
  }

  function showToast(message) {
    els.toast.textContent = message;
    els.toast.classList.remove('hidden');
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(function () {
      els.toast.classList.add('hidden');
    }, 2200);
  }


function startTuner() {
  if (!state.externalTunerUrl || state.externalTunerUrl === 'PUT_YOUR_TUNER_URL_HERE') {
    showToast('Set EXTERNAL_TUNER_URL in Code.gs first.');
    return;
  }

  window.open(state.externalTunerUrl, '_blank', 'noopener');
  els.tunerStatus.textContent = 'External';
  els.tunerDetail.textContent = 'Standalone tuner opened in a new tab.';
  showToast('Opening standalone tuner...');
}


function stopTuner() {
  if (!state.externalTunerUrl || state.externalTunerUrl === 'PUT_YOUR_TUNER_URL_HERE') {
    showToast('Set EXTERNAL_TUNER_URL in Code.gs first.');
    return;
  }

  var copyText = state.externalTunerUrl;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(copyText).then(function () {
      showToast('Tuner link copied.');
    }).catch(function () {
      fallbackCopy(copyText);
    });
    return;
  }

  fallbackCopy(copyText);
}

function fallbackCopy(text) {
  try {
    var input = document.createElement('textarea');
    input.value = text;
    input.setAttribute('readonly', 'readonly');
    input.style.position = 'fixed';
    input.style.opacity = '0';
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    document.body.removeChild(input);
    showToast('Tuner link copied.');
  } catch (err) {
    showToast('Copy failed. Open the tuner directly from the button.');
  }
}

  function updatePitch() {
    if (!state.tuner.analyser || !state.tuner.audioContext) return;

    var buffer = new Float32Array(state.tuner.analyser.fftSize);
    state.tuner.analyser.getFloatTimeDomainData(buffer);

    var frequency = autoCorrelate(buffer, state.tuner.audioContext.sampleRate);
    if (frequency !== -1) {
      var noteInfo = frequencyToNote(frequency);
      els.tunerNote.textContent = noteInfo.note;
      els.tunerFrequency.textContent = frequency.toFixed(2) + ' Hz';
      els.tunerDetail.textContent = noteInfo.cents + ' cents · nearest string ' + noteInfo.stringName;
    }

    state.tuner.raf = requestAnimationFrame(updatePitch);
  }

  function autoCorrelate(buffer, sampleRate) {
    var SIZE = buffer.length;
    var rms = 0;
    for (var i = 0; i < SIZE; i += 1) {
      var val = buffer[i];
      rms += val * val;
    }
    rms = Math.sqrt(rms / SIZE);
    if (rms < 0.01) return -1;

    var r1 = 0;
    var r2 = SIZE - 1;
    var threshold = 0.2;

    for (var j = 0; j < SIZE / 2; j += 1) {
      if (Math.abs(buffer[j]) < threshold) {
        r1 = j;
        break;
      }
    }

    for (var k = 1; k < SIZE / 2; k += 1) {
      if (Math.abs(buffer[SIZE - k]) < threshold) {
        r2 = SIZE - k;
        break;
      }
    }

    buffer = buffer.slice(r1, r2);
    SIZE = buffer.length;

    var c = new Array(SIZE).fill(0);
    for (var offset = 0; offset < SIZE; offset += 1) {
      for (var n = 0; n < SIZE - offset; n += 1) {
        c[offset] = c[offset] + buffer[n] * buffer[n + offset];
      }
    }

    var d = 0;
    while (c[d] > c[d + 1]) d += 1;

    var maxValue = -1;
    var maxIndex = -1;
    for (var index = d; index < SIZE; index += 1) {
      if (c[index] > maxValue) {
        maxValue = c[index];
        maxIndex = index;
      }
    }

    var T0 = maxIndex;
    var x1 = c[T0 - 1];
    var x2 = c[T0];
    var x3 = c[T0 + 1];
    var a = (x1 + x3 - 2 * x2) / 2;
    var b = (x3 - x1) / 2;
    if (a) T0 = T0 - b / (2 * a);

    return sampleRate / T0;
  }

  function frequencyToNote(frequency) {
    var midi = Math.round(12 * (Math.log(frequency / 440) / Math.log(2)) + 69);
    var noteIndex = ((midi % 12) + 12) % 12;
    var octave = Math.floor(midi / 12) - 1;
    var target = 440 * Math.pow(2, (midi - 69) / 12);
    var cents = Math.round(1200 * Math.log(frequency / target) / Math.log(2));
    var nearestString = STRINGS.reduce(function (best, stringInfo) {
      if (!best) return stringInfo;
      return Math.abs(stringInfo.frequency - frequency) < Math.abs(best.frequency - frequency) ? stringInfo : best;
    }, null);

    return {
      note: notes[noteIndex] + octave,
      cents: cents > 0 ? '+' + cents : String(cents),
      stringName: nearestString ? nearestString.name : '--'
    };
  }

  function playReferenceTone(frequency) {
    var AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!state.tuner.oscillatorContext) {
      state.tuner.oscillatorContext = new AudioCtx();
    }

    var ctx = state.tuner.oscillatorContext;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.frequency.value = frequency;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.8);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.82);
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
})();
</script>
